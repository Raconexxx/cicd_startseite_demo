stages:
  - check
  - validate

php_lint:
  stage: check
  image: php:8.3-cli
  script:
    - find . -path "./.git" -prune -o -name "*.php" -print -exec php -l {} \;

compose_validate:
  stage: validate
  image: docker:27
  script:
    - cp .env.example .env
    - docker compose version
    - docker compose config
