name: Startseite CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    name: Validate project
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: PHP syntax check
        run: find . -path './.git' -prune -o -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Content smoke checks
        run: |
          test -f .env.example
          test ! -f .env
          grep -q "Impressum" impressum.php
          grep -q "Datenschutz" datenschutz.php
          grep -q "legal.css" impressum.php
          grep -q "legal.css" datenschutz.php

      - name: Secret leak check
        run: |
          if grep -R --exclude="README.md" --exclude=".env.example" --exclude=".gitlab-ci.yml" --exclude-dir=".github" --exclude-dir=".git" "MARIADB_ROOT_PASSWORD=" .; then
            echo "Geheimer Datenbankwert im Repository gefunden."
            exit 1
          fi

  deploy:
    name: Optional FTP/SFTP deploy
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main'
    env:
      STARTSEITE_DEPLOY_METHOD: ftps
      STARTSEITE_DEPLOY_PORT: '21'
      STARTSEITE_DEPLOY_PATH: /
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install deploy tools
        run: sudo apt-get update && sudo apt-get install -y lftp openssh-client sshpass

      - name: Deploy via FTP, FTPS or SFTP
        env:
          DEPLOY_METHOD: ${{ env.STARTSEITE_DEPLOY_METHOD }}
          DEPLOY_HOST: ${{ vars.STARTSEITE_DEPLOY_HOST }}
          DEPLOY_PORT: ${{ env.STARTSEITE_DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.STARTSEITE_DEPLOY_USER }}
          DEPLOY_PATH: ${{ env.STARTSEITE_DEPLOY_PATH }}
          DEPLOY_PASSWORD: ${{ secrets.STARTSEITE_DEPLOY_PASSWORD }}
        run: |
          set -eu

          METHOD="${DEPLOY_METHOD:-ftps}"
          HOST="${DEPLOY_HOST:?STARTSEITE_DEPLOY_HOST fehlt}"
          USER="${DEPLOY_USER:?STARTSEITE_DEPLOY_USER fehlt}"
          PASSWORD="${DEPLOY_PASSWORD:?STARTSEITE_DEPLOY_PASSWORD fehlt}"
          TARGET_PATH="${DEPLOY_PATH:-/}"

          case "$METHOD" in
            ftp|ftps)
              PORT="${DEPLOY_PORT:-21}"
              SSL_FORCE="false"
              if [ "$METHOD" = "ftps" ]; then
                SSL_FORCE="true"
              fi

              lftp -u "$USER","$PASSWORD" -p "$PORT" "$HOST" <<EOF
          set ftp:ssl-force $SSL_FORCE
          set ftp:ssl-protect-data $SSL_FORCE
          set ssl:verify-certificate no
          mirror --reverse --verbose --delete \
            --exclude-glob .git/ \
            --exclude-glob .github/ \
            --exclude-glob .env \
            --exclude-glob .gitlab-ci.yml \
            --exclude-glob docker-compose.yml \
            ./ "$TARGET_PATH"
          bye
          EOF
              ;;

            sftp)
              PORT="${DEPLOY_PORT:-22}"
              tar \
                --exclude='.git/' \
                --exclude='.github/' \
                --exclude='.env' \
                --exclude='.gitlab-ci.yml' \
                --exclude='docker-compose.yml' \
                -czf - . \
              | SSHPASS="$PASSWORD" sshpass -e ssh \
                -o StrictHostKeyChecking=accept-new \
                -p "$PORT" \
                "$USER@$HOST" \
                "mkdir -p '$TARGET_PATH' && tar -xzf - -C '$TARGET_PATH'"
              ;;

            *)
              echo "Unbekannte Deployment-Methode: $METHOD"
              echo "Erlaubt sind: ftp, ftps, sftp"
              exit 1
              ;;
          esac

  smoke:
    name: Optional public smoke test
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Check public pages
        env:
          STARTSEITE_PUBLIC_URL: ${{ vars.STARTSEITE_PUBLIC_URL }}
        run: |
          test -n "$STARTSEITE_PUBLIC_URL"
          BASE_URL="$STARTSEITE_PUBLIC_URL"
          curl -fsS "$BASE_URL/impressum.php" | grep -q "Impressum"
          curl -fsS "$BASE_URL/datenschutz.php" | grep -q "Datenschutz"
